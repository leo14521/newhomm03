      stroke-width="1.15"
      opacity="0.42"
    />
    <path
      d="M 218 188 C 238 168 268 168 280 188 C 292 168 322 168 342 188"
      stroke="url(#lineGold)"
      stroke-width="0.85"
      opacity="0.35"
    />
  </g>
  <!-- 중앙 세로 악센트 (브랜드 수직 리듬) -->
  <line x1="280" y1="158" x2="280" y2="218" stroke="url(#lineGold)" stroke-width="1" opacity="0.28" stroke-linecap="round"/>
  <text
    x="280"
    y="312"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="13"
    letter-spacing="0.42em"
    fill="#7a726a"
    opacity="0.88"
  >
    GRAND OPENING
  </text>
  <text
    x="280"
    y="338"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
