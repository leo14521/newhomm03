# Next.js App Router — 반드시 이 플러그인으로 배포물이 생성됩니다.
# (플러그인 없으면 Netlify가 정적 사이트처럼 index.html만 찾아 전체가 404가 될 수 있음)
# 대시보드: Publish directory 는 비워 두세요. "public" / "." 로 두면 안 됩니다.
# https://docs.netlify.com/frameworks/next-js/overview/

[build]
  command = "npm run build"
  # Next 런타임이 출력 경로를 잡습니다. 여기에 publish 를 쓰지 마세요.

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
